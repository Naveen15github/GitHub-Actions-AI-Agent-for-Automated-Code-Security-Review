name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same PR to avoid duplicate reviews
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: AI Code Review Agent
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write   # Required: post PR comments
      contents: read         # Required: checkout code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # Full history for accurate diffs

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Code Review Agent
        run: python -m agent.graph
        env:
          # ── OpenRouter API keys (rotate on rate limit) ──────────────────
          OPENROUTER_API_KEY_1: ${{ secrets.OPENROUTER_API_KEY_1 }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          OPENROUTER_API_KEY_3: ${{ secrets.OPENROUTER_API_KEY_3 }}

          # ── GitHub context (auto-provided by Actions) ───────────────────
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}

          # ── Slack notifications ─────────────────────────────────────────
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
